<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrator - Kalkulator Lembur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .btn-dinamis {
            display: block;
            width: 100%; /* Membuat tombol melebar penuh */
            transition: all 0.2s ease-in;
            position: relative;
            overflow: hidden;
            z-index: 1;
            color: #090909;
            padding: 0.7em 1.7em;
            cursor: pointer;
            font-size: 18px;
            border-radius: 0.5em;
            background: #e8e8e8;
            border: 1px solid #e8e8e8;
            box-shadow: 6px 6px 12px #c5c5c5, -6px -6px 12px #ffffff;
            font-weight: bold;
            text-align: center;
        }

        .btn-dinamis:active {
            color: #666;
            box-shadow: inset 4px 4px 12px #c5c5c5, inset -4px -4px 12px #ffffff;
        }

        .btn-dinamis:before {
            content: "";
            position: absolute;
            left: 50%;
            transform: translateX(-50%) scaleY(1) scaleX(1.25);
            top: 100%;
            width: 140%;
            height: 180%;
            background-color: rgba(0, 0, 0, 0.05);
            border-radius: 50%;
            display: block;
            transition: all 0.5s 0.1s cubic-bezier(0.55, 0, 0.1, 1);
            z-index: -1;
        }

        .btn-dinamis:after {
            content: "";
            position: absolute;
            left: 55%;
            transform: translateX(-50%) scaleY(1) scaleX(1.45);
            top: 180%;
            width: 160%;
            height: 190%;
            background-color: #0d6efd; /* Warna Biru Bootstrap */
            border-radius: 50%;
            display: block;
            transition: all 0.5s 0.1s cubic-bezier(0.55, 0, 0.1, 1);
            z-index: -1;
        }

        .btn-dinamis:hover {
            color: #ffffff;
            border: 1px solid #0d6efd;
        }

        .btn-dinamis:hover:before {
            top: -35%;
            background-color: #0d6efd;
            transform: translateX(-50%) scaleY(1.3) scaleX(0.8);
        }

        .btn-dinamis:hover:after {
            top: -45%;
            background-color: #0d6efd;
            transform: translateX(-50%) scaleY(1.3) scaleX(0.8);
        }
    </style>
</head>

<body class="bg-secondary">
    <div class="container mt-5">
        <div class="row justify-content-center mt-5">
            <div class="col-md-4">
                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">Login</h3>
                        <form id="formLogin">
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" id="username" class="form-control" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Password</label>
                                <input type="password" id="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn-dinamis">Masuk ke Sistem</button>
                        </form>
                        <div class="mt-4 text-center">
                            <button onclick="window.location.href='/register.html'" class="fw-bold btn btn-success">Buat
                                Akun</button>
                        </div>
                    </div>
                </div>
                <p class="text-center text-white mt-3" style="font-size: 0.8rem;">
                    Hanya untuk akses administrator Ayyasy.
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Simpan Tiket
                    localStorage.setItem('tokenLembur', data.token);

                    // Sortir arah halaman berdasarkan peran
                    if (data.role === 'admin') {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/index.html';
                    }
                } else {
                    alert(data.pesan);
                }
            } catch (err) {
                alert("Gagal terhubung ke server.");
            }
        });
    </script>
</body>

</html>
