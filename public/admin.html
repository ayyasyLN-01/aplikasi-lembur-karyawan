<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard SPA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        const token = localStorage.getItem('tokenLembur');
        if (!token) window.location.href = '/login.html';
        function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1])); } catch (e) { return null; } }
        if (parseJwt(token).role !== 'admin') window.location.href = '/index.html';
    </script>
    <style>
        .sidebar {
            min-height: 100vh;
            background-color: #7b1fa2;
            color: white;
            width: 250px;
        }

        .sidebar .nav-link {
            color: #e1bee7;
            margin-bottom: 5px;
            cursor: pointer;
        }

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background-color: #4a148c;
            color: white;
            border-radius: 5px;
        }

        .content-area {
            flex-grow: 1;
            background-color: #f8f9fa;
        }

        .section-panel {
            display: none;
        }

        .section-panel.active {
            display: block;
        }

        .btn-bulan {
            margin: 2px;
        }
    </style>
</head>

<body class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar p-3 d-flex flex-column shadow">
        <h4 class="text-center mb-4 border-bottom pb-3">🛡️ Admin Panel</h4>
        <ul class="nav flex-column mb-auto">
            <li class="nav-item">
                <a class="nav-link active" onclick="pindahMenu('dashboard', this)">📊 Dashboard Rekap</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" onclick="pindahMenu('konfirmasi', this)">👥 Konfirmasi Akun Baru</a>
            </li>
        </ul>
        <button class="btn btn-danger mt-auto fw-bold" onclick="logout()">Logout</button>
    </div>

    <!-- KONTEN UTAMA -->
    <div class="content-area p-4">

        <!-- PANEL 1: DASHBOARD & FILTER -->
        <div id="dashboard" class="section-panel active">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="m-0">Rekapitulasi Lembur Karyawan</h3>
                <button class="btn btn-success fw-bold" onclick="exportKeExcel()">⬇️ Ekspor (.xlsx)</button>
            </div>

            <!-- Alat Filter Waktu (Bulan & Tahun) -->
            <div class="card shadow-sm border-0 mb-3 bg-white p-3">
                <div class="row align-items-center">
                    <div class="col-md-3">
                        <label class="fw-bold text-muted mb-1">Pilih Tahun:</label>
                        <select id="filterTahun" class="form-select" onchange="terapkanFilter()">
                            <option value="2026">2026</option>
                            <option value="2025">2025</option>
                            <option value="2027">2027</option>
                        </select>
                    </div>
                    <div class="col-md-9">
                        <label class="fw-bold text-muted mb-1">Pilih Bulan:</label>
                        <div id="gridBulan" class="d-flex flex-wrap">
                            <!-- Tombol bulan dibuat via JS -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- FITUR BARU: Pencarian Nama & Opsi Pengurutan -->
            <div class="row mb-3">
                <div class="col-md-8">
                    <input type="text" id="cariNama" class="form-control border-primary"
                        placeholder="🔍 Ketik nama karyawan untuk mencari..." onkeyup="renderTabelAdmin()">
                </div>
                <div class="col-md-4">
                    <select id="sortMode" class="form-select border-primary" onchange="renderTabelAdmin()">
                        <option value="nama_asc">Urutkan: Nama (A-Z) & Tanggal</option>
                        <option value="tanggal_desc">Urutkan: Tanggal Terbaru</option>
                    </select>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-0 table-responsive" style="max-height: 500px;">
                    <table class="table table-hover table-striped mb-0 text-center align-middle">
                        <thead class="table-dark" style="position: sticky; top: 0;">
                            <tr>
                                <th>Nama Karyawan</th>
                                <th>Tanggal</th>
                                <th>Jenis</th>
                                <th>Durasi</th>
                                <th>Total Uang (Rp)</th>
                            </tr>
                        </thead>
                        <tbody id="tabelAdmin"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- PANEL 2: KONFIRMASI AKUN -->
        <div id="konfirmasi" class="section-panel">
            <h3 class="mb-4">Menunggu Persetujuan Akun</h3>
            <div class="card shadow-sm border-0">
                <div class="card-body p-0 table-responsive">
                    <table class="table table-hover mb-0 text-center align-middle">
                        <thead class="table-primary">
                            <tr>
                                <th>Nama Lengkap</th>
                                <th>Username</th>
                                <th>Gaji Pokok Diajukan</th>
                                <th>Aksi Admin</th>
                            </tr>
                        </thead>
                        <tbody id="tabelPending"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL EDIT & SETUJUI AKUN (Sama seperti sebelumnya) -->
    <div class="modal fade" id="modalSetujui" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Validasi Data Karyawan</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formSetujui">
                        <input type="hidden" id="pendingId">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nama Karyawan</label>
                            <input type="text" class="form-control" id="pendingNama" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Gaji Pokok (Koreksi jika perlu)</label>
                            <input type="number" class="form-control" id="pendingGaji" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold">Simpan & Aktifkan Akun</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const formatRupiah = (angka) => new Intl.NumberFormat('id-ID').format(angka);
        let dataLemburUtama = []; // Menyimpan data mentah dari server
        let bulanAktif = new Date().getMonth() + 1;

        function logout() { localStorage.removeItem('tokenLembur'); window.location.href = '/login.html'; }

        function pindahMenu(target, el) {
            document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(target).classList.add('active');
            document.querySelectorAll('.sidebar .nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
            if (target === 'konfirmasi') muatPendingUsers();
        }

        // --- SISTEM NAVIGASI BULAN ---
        const namaBulan = ["Semua", "Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
        function renderTombolBulan() {
            const grid = document.getElementById('gridBulan');
            grid.innerHTML = '';
            for (let i = 0; i <= 12; i++) {
                const btn = document.createElement('button');
                btn.className = `btn btn-sm btn-bulan fw-bold ${i === bulanAktif ? 'btn-primary' : 'btn-outline-primary'}`;
                btn.innerText = namaBulan[i];
                btn.onclick = () => { bulanAktif = i; renderTombolBulan(); terapkanFilter(); };
                grid.appendChild(btn);
            }
        }

        // --- FETCH DATA DARI SERVER ---
        async function terapkanFilter() {
            const tahun = document.getElementById('filterTahun').value;
            let url = `/api/admin/semua-lembur?tahun=${tahun}`;
            if (bulanAktif !== 0) url += `&bulan=${bulanAktif}`;

            const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
            dataLemburUtama = await res.json();

            // Setelah data diambil dari server, lakukan render lokal
            renderTabelAdmin();
        }

        // --- FUNGSI BARU: RENDER, FILTER NAMA, & SORTING ---
        function renderTabelAdmin() {
            const tbody = document.getElementById('tabelAdmin');
            tbody.innerHTML = '';

            const kataKunci = document.getElementById('cariNama').value.toLowerCase();
            const sortMode = document.getElementById('sortMode').value;

            // 1. Filter Nama secara Real-Time
            let dataTampil = dataLemburUtama.filter(item => item.nama_lengkap.toLowerCase().includes(kataKunci));

            // 2. Terapkan Logika Pengurutan (Sorting)
            dataTampil.sort((a, b) => {
                if (sortMode === 'nama_asc') {
                    // Urutkan A-Z
                    if (a.nama_lengkap < b.nama_lengkap) return -1;
                    if (a.nama_lengkap > b.nama_lengkap) return 1;
                    // Jika nama sama, urutkan tanggal terbaru di atas
                    return new Date(b.tanggal_lembur) - new Date(a.tanggal_lembur);
                } else {
                    // Murni urutkan tanggal terbaru
                    return new Date(b.tanggal_lembur) - new Date(a.tanggal_lembur);
                }
            });

            // 3. Tampilkan ke Layar
            if (dataTampil.length === 0) return tbody.innerHTML = '<tr><td colspan="5" class="py-4 text-muted fw-bold">Tidak ada data ditemukan.</td></tr>';

            dataTampil.forEach(item => {
                const tgl = new Date(item.tanggal_lembur).toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
                tbody.innerHTML += `
                    <tr>
                        <td class="fw-bold text-start ps-4">${item.nama_lengkap}</td>
                        <td>${tgl}</td>
                        <td><span class="badge ${item.jenis_hari === 'Weekday' ? 'bg-secondary' : 'bg-warning text-dark'}">${item.jenis_hari}</span></td>
                        <td>${item.jam_lembur}</td>
                        <td class="text-success fw-bold">Rp ${formatRupiah(item.total_uang_lembur)}</td>
                    </tr>
                `;
            });
        }

        // --- FITUR KONFIRMASI AKUN ---
        async function muatPendingUsers() {
            const res = await fetch('/api/admin/pending-users', { headers: { 'Authorization': 'Bearer ' + token } });
            const data = await res.json();
            const tbody = document.getElementById('tabelPending');
            tbody.innerHTML = '';
            if (data.length === 0) return tbody.innerHTML = '<tr><td colspan="4" class="py-4">Tidak ada pendaftaran baru.</td></tr>';

            data.forEach(u => {
                tbody.innerHTML += `
                    <tr>
                        <td class="fw-bold">${u.nama_lengkap}</td>
                        <td>${u.username}</td>
                        <td class="text-success fw-bold">Rp ${formatRupiah(u.gaji_pokok)}</td>
                        <td>
                            <button class="btn btn-sm btn-success fw-bold me-1" onclick="bukaModalSetujui(${u.id}, '${u.nama_lengkap}', ${u.gaji_pokok})">Edit & Setujui</button>
                            <button class="btn btn-sm btn-danger fw-bold" onclick="tolakUser(${u.id})">Tolak</button>
                        </td>
                    </tr>
                `;
            });
        }

        const modalSetujui = new bootstrap.Modal(document.getElementById('modalSetujui'));
        function bukaModalSetujui(id, nama, gaji) {
            document.getElementById('pendingId').value = id;
            document.getElementById('pendingNama').value = nama;
            document.getElementById('pendingGaji').value = gaji;
            modalSetujui.show();
        }

        document.getElementById('formSetujui').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('pendingId').value;
            const payload = {
                namaLengkap: document.getElementById('pendingNama').value,
                gajiPokok: parseFloat(document.getElementById('pendingGaji').value)
            };
            const res = await fetch('/api/admin/approve-user/' + id, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify(payload) });
            if (res.ok) { modalSetujui.hide(); muatPendingUsers(); }
        });

        async function tolakUser(id) {
            if (!confirm("Yakin ingin menolak dan menghapus pendaftaran ini?")) return;
            const res = await fetch('/api/admin/reject-user/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
            if (res.ok) muatPendingUsers();
        }

        // --- Ekspor Excel (.xlsx) ---
        function exportKeExcel() {
            // Gunakan data yang sedang tampil di layar (sudah difilter nama/diurutkan)
            const kataKunci = document.getElementById('cariNama').value.toLowerCase();
            const dataSiapEkspor = dataLemburUtama.filter(item => item.nama_lengkap.toLowerCase().includes(kataKunci));

            if (dataSiapEkspor.length === 0) return alert("Belum ada data untuk diekspor.");

            const dataFinal = dataSiapEkspor.map(row => ({
                "Nama Lengkap": row.nama_lengkap,
                "Tanggal": new Date(row.tanggal_lembur).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }),
                "Jenis Hari": row.jenis_hari,
                "Durasi (Jam)": row.jam_lembur,
                "Total Uang (Rp)": row.total_uang_lembur
            }));

            const ws = XLSX.utils.json_to_sheet(dataFinal);
            ws['!cols'] = [{ wch: 25 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 20 }];
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Rekap Lembur");
            XLSX.writeFile(wb, `Rekap_Lembur_Bulan_${bulanAktif}_Tahun_${document.getElementById('filterTahun').value}.xlsx`);
        }

        // Inisialisasi awal
        window.onload = () => {
            renderTombolBulan();
            document.getElementById('filterTahun').value = new Date().getFullYear();
            terapkanFilter();
        };
    </script>
</body>

</html>
