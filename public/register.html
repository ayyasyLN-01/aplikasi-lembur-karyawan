<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Karyawan - Portal Lembur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-secondary">
    <div class="container mt-5">
        <div class="row justify-content-center mt-4">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-lg border-0 p-4 rounded-3">
                    <h4 class="text-center mb-4 fw-bold text-primary">Pendaftaran Akun</h4>
                    <form id="formRegister">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted" style="font-size: 0.9rem;">Nama Lengkap</label>
                            <input type="text" id="namaLengkap" class="form-control" placeholder="Sesuai KTP/Kontrak"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted" style="font-size: 0.9rem;">Username</label>
                            <input type="text" id="username" class="form-control" placeholder="Tanpa spasi" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted" style="font-size: 0.9rem;">Password</label>
                            <input type="password" id="password" class="form-control" placeholder="Minimal 6 karakter"
                                required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted" style="font-size: 0.9rem;">Gaji Pokok (Pengali
                                173)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light">Rp</span>
                                <input type="number" id="gajiPokok" class="form-control" placeholder="Contoh: 5000000"
                                    required>
                            </div>
                            <div class="form-text text-danger" style="font-size: 0.75rem;">
                                *Nominal gaji akan divalidasi dan disetujui oleh Administrator sebelum akun aktif.
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Daftarkan Akun Saya</button>
                    </form>

                    <hr class="my-4">

                    <a href="/login.html" class="d-block text-center text-decoration-none text-muted"
                        style="font-size: 0.9rem;">
                        Sudah punya akun? <span class="fw-bold text-dark">Kembali ke Login</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('formRegister').addEventListener('submit', async (e) => {
            e.preventDefault(); // Mencegah reload halaman

            // 1. Mengumpulkan data dari kotak input
            const payload = {
                namaLengkap: document.getElementById('namaLengkap').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                gajiPokok: parseFloat(document.getElementById('gajiPokok').value)
            };

            try {
                // 2. Mengirim data ke jalur '/api/register' di server.js
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                // 3. Menampilkan pesan dari server (Sukses / Gagal)
                alert(data.pesan);

                // 4. Jika sukses tersimpan di database, lempar kembali ke halaman login
                if (response.ok) {
                    window.location.href = '/login.html';
                }
            } catch (error) {
                alert("Terjadi kesalahan jaringan saat mencoba mendaftar.");
            }
        });
    </script>
</body>

</html>
